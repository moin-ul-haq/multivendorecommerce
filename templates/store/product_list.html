<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
</head>
<body>
    <center><h1>Products</h1></center>
    <ul>
        {% for product in products %}
            <li>
                <a href="{% url 'product_detail' product.store.slug product.slug %}">{{ product.name }}</a>
                - {{ product.price }}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
