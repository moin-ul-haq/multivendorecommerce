<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store.name }}</title>
</head>
<body>
    <center><h1>{{ store.name }}</h1></center>
    <p>{{ store.description }}</p>

    <h1>Products</h1>

    {% for product in store.product.all %}
    <ul>
        <li><a href="{% url "product_detail" product.store.slug product.slug %}">{{product.name}}</a></li>
    </ul>
    {% endfor %}
        <a href="{% url "store" %}">Go to Stores</a>
</body>
</html>
