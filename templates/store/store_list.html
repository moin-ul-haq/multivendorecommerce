{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stores</title>
</head>
<body>
    
    <center><h1>Stores</h1></center>
    <ul>

        {% endfor %}
    </ul>

</body>
</html>
